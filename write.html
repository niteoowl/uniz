<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 게시물 작성</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align to top */
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem; /* Add padding for mobile view */
        }
        .write-container {
            background-color: white;
            padding: 2.5rem;
            border-radius: 0.5rem;
            border: 1px solid #e0e0e0;
            width: 90%;
            max-width: 800px; /* Wider for post content */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); /* Subtle shadow */
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 700;
            color: #333;
            font-size: 1.125rem; /* Larger label */
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ccc;
            border-radius: 0.375rem;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6; /* blue-500 */
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25); /* blue-500 with opacity */
        }
        /* Quill editor specific styling */
        #editor {
            height: 300px; /* Fixed height for the editor */
            border: 1px solid #ccc;
            border-radius: 0.375rem;
            font-size: 1rem;
            overflow-y: auto; /* Enable scrolling for content */
        }
        .ql-toolbar {
            border-top-left-radius: 0.375rem;
            border-top-right-radius: 0.375rem;
            border-bottom: 1px solid #ccc;
        }
        .ql-container {
            border-bottom-left-radius: 0.375rem;
            border-bottom-right-radius: 0.375rem;
        }
        .ql-toolbar.ql-snow + .ql-container.ql-snow {
            border-top: none; /* Remove double border */
        }
        .error-message {
            color: #ef4444; /* red-500 */
            font-size: 0.875rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        .success-message {
            color: #22c55e; /* green-500 */
            font-size: 0.875rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="write-container">
        <h1 class="text-3xl font-bold mb-8 text-gray-800 text-center">새 게시물 작성</h1>

        <div id="writeForm">
            <div class="form-group">
                <label for="postTitle">제목</label>
                <input type="text" id="postTitle" placeholder="제목을 입력하세요">
            </div>
            <div class="form-group">
                <label>내용</label>
                <div id="editor"></div> <input type="hidden" id="postContentHtml"> </div>
            <p id="writeError" class="error-message hidden"></p>
            <p id="writeSuccess" class="success-message hidden"></p>
            <div class="flex justify-end space-x-4 mt-6">
                <button id="cancelWriteBtn" class="bg-gray-300 text-gray-800 px-6 py-3 rounded-md hover:bg-gray-400 transition duration-200 font-semibold">취소</button>
                <button id="submitWriteBtn" class="bg-blue-600 text-white px-6 py-3 rounded-md hover:bg-blue-700 transition duration-200 font-semibold">작성</button>
            </div>
        </div>

        <div id="loginRequiredMessage" class="hidden text-center mt-8">
            <p class="text-xl text-gray-700 mb-6">게시물을 작성하려면 로그인해야 합니다.</p>
            <button id="goToLoginBtn" class="bg-blue-600 text-white px-6 py-3 rounded-md hover:bg-blue-700 transition duration-200 text-lg font-semibold">로그인 페이지로 이동</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-analytics.js";

        // Firebase configuration (사용자님께서 제공해주신 정확한 설정)
        const firebaseConfig = {
            apiKey: "AIzaSyDLzrMR2QVK4rWNDIg4bQv4rlYTkchnU58",
            authDomain: "uniz-a.firebaseapp.com",
            projectId: "uniz-a",
            storageBucket: "uniz-a.firebasestorage.app",
            messagingSenderId: "389183402425",
            appId: "1:389183402425:web:1272bcca61cdf9720c0668",
            measurementId: "G-RTWDXH8GKQ"
        };

        let app;
        let db;
        let auth;
        let postsCollectionRef;
        let currentUser = null; // Track current authenticated user
        let quill; // Quill editor instance

        // DOM Elements
        const writeForm = document.getElementById('writeForm');
        const loginRequiredMessage = document.getElementById('loginRequiredMessage');
        const postTitleInput = document.getElementById('postTitle');
        const postContentHtmlInput = document.getElementById('postContentHtml'); // Hidden input
        const submitWriteBtn = document.getElementById('submitWriteBtn');
        const cancelWriteBtn = document.getElementById('cancelWriteBtn');
        const writeErrorMsg = document.getElementById('writeError');
        const writeSuccessMsg = document.getElementById('writeSuccess');
        const goToLoginBtn = document.getElementById('goToLoginBtn');

        // Function to show error message
        const showErrorMessage = (message) => {
            writeErrorMsg.textContent = message;
            writeErrorMsg.classList.remove('hidden');
            writeSuccessMsg.classList.add('hidden');
        };

        // Function to hide error message
        const hideErrorMessage = () => {
            writeErrorMsg.classList.add('hidden');
            writeErrorMsg.textContent = '';
        };

        // Function to show success message
        const showSuccessMessage = (message) => {
            writeSuccessMsg.textContent = message;
            writeSuccessMsg.classList.remove('hidden');
            writeErrorMsg.classList.add('hidden');
        };

        // Initialize Firebase
        const initFirebase = async () => {
            try {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                const analytics = getAnalytics(app);

                const appId = firebaseConfig.projectId;
                postsCollectionRef = collection(db, `artifacts/${appId}/public/data/posts`);

                onAuthStateChanged(auth, (user) => {
                    currentUser = user; // Update current user
                    if (user && user.uid) {
                        // User is logged in, show the write form
                        writeForm.classList.remove('hidden');
                        loginRequiredMessage.classList.add('hidden');
                        hideErrorMessage(); // Clear any previous error messages
                        // Initialize Quill editor only after user is authenticated and form is visible
                        if (!quill) {
                            initializeQuill();
                        }
                    } else {
                        // User is not logged in, show login required message
                        writeForm.classList.add('hidden');
                        loginRequiredMessage.classList.remove('hidden');
                        showErrorMessage("게시물을 작성하려면 로그인해야 합니다.");
                    }
                });
            } catch (error) {
                console.error("Error initializing Firebase:", error);
                showErrorMessage("Firebase 초기화 중 오류가 발생했습니다.");
            }
        };

        // Initialize Quill.js editor
        const initializeQuill = () => {
            quill = new Quill('#editor', {
                theme: 'snow', // 'snow' or 'bubble'
                placeholder: '내용을 입력하세요...',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                        ['bold', 'italic', 'underline', 'strike'],        // toggled buttons
                        ['blockquote', 'code-block'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'indent': '-1'}, { 'indent': '+1' }],          // outdent/indent
                        [{ 'direction': 'rtl' }],                         // text direction
                        [{ 'color': [] }, { 'background': [] }],          // dropdown with defaults from theme
                        [{ 'font': [] }],
                        [{ 'align': [] }],
                        ['link', 'image'], // Removed 'video' as it requires more setup
                        ['clean']                                         // remove formatting button
                    ]
                }
            });

            // Update hidden input on text change
            quill.on('text-change', () => {
                postContentHtmlInput.value = quill.root.innerHTML;
            });
        };


        // Function to create a new post
        const createPost = async () => {
            hideErrorMessage(); // Clear previous errors
            hideSuccessMessage(); // Clear previous success messages

            if (!currentUser || !currentUser.uid) {
                showErrorMessage("게시물을 작성하려면 로그인해야 합니다.");
                return;
            }

            const title = postTitleInput.value.trim();
            // Get content from Quill editor's innerHTML
            const contentHtml = quill.root.innerHTML.trim();
            const contentText = quill.getText().trim(); // Get plain text for validation

            if (!title || contentText.length === 0 || contentHtml === "<p><br></p>") { // Check for empty content
                showErrorMessage("제목과 내용을 모두 입력해주세요.");
                return;
            }

            try {
                submitWriteBtn.disabled = true; // Disable button to prevent multiple submissions
                submitWriteBtn.textContent = "작성 중...";

                await addDoc(postsCollectionRef, {
                    title: title,
                    content: contentHtml, // Store HTML content
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName || `익명${currentUser.uid.substring(0, 4)}`,
                    createdAt: serverTimestamp(),
                    views: 0,
                    recommendations: 0,
                    comments: 0
                });
                showSuccessMessage("게시물이 성공적으로 작성되었습니다! 메인 페이지로 이동합니다.");
                console.log("Post added successfully!");
                // Redirect to main page after a short delay to show success message
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000); // 2 seconds delay
            } catch (error) {
                console.error("Error adding post:", error);
                showErrorMessage(`게시물 작성 실패: ${error.message}`);
            } finally {
                submitWriteBtn.disabled = false; // Re-enable button
                submitWriteBtn.textContent = "작성";
            }
        };

        // Event Listeners
        submitWriteBtn.addEventListener('click', createPost);
        cancelWriteBtn.addEventListener('click', () => {
            window.location.href = 'index.html'; // Go back to main page
        });
        goToLoginBtn.addEventListener('click', () => {
            window.location.href = 'auth.html'; // Go to login page
        });

        // Initialize Firebase when the window loads
        window.onload = initFirebase;
    </script>
</body>
</html>
